{% extends "base.html" %}

{% block title %}Events - EventHub{% endblock %}

{% block content %}
<h2 class="mb-4 fw-bold">Upcoming Events</h2>

<div class="row">
  {% for event in events %}
  <div class="col-md-4">
    <div class="card shadow-lg mb-4">
      <div class="card-body">
        <h5 class="card-title">{{ event.title }}</h5>
        <p class="card-text">{{ event.location }}</p>
        <p><strong>Date:</strong> {{ event.date }}</p>
        <a href="/events/{{ event.id }}/" class="btn btn-outline-primary">
          View Details
        </a>
      </div>
    </div>
  </div>
  {% empty %}
  <p>No events available.</p>
  {% endfor %}
</div>
{% endblock %}
